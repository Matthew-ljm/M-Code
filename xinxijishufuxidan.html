<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>信息技术七年级知识点总结</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
        }

     .download-button {
            position: absolute;
            top: 20%;
            padding: 15px 30px;
            background-color: orange;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

     .download-button:hover {
            background-color: goldenrod;
        }

     .text-on-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            color: #FFD700;
            z-index: 2;
        }
    </style>
</head>

<body>
    <div class="text-on-top">信息技术七年级知识点总结</div>
    <img src="https://m-code.top/信息技术七年级知识点总结.jpg" alt="Background Image" id="myImage">
    <button class="download-button" style="left:10%;top:20%;" onclick="saveFile()">保存</button>
    <button class="download-button" style="left:40%;top:20%;" onclick="window.location.href='download.html'">返回</button>

    <script>
        function saveFile() {
            const img = document.getElementById('myImage');
            const a = document.createElement('a');
            a.href = img.src;
            a.download = '信息技术七年级知识点总结.jpg';
            a.click();
        }
    </script>
</body>

</html>
