        img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
        }

       .download-button {
            position: absolute;

        }

       .text-on-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 4rem;
            color: #FFD700;
            z-index: 2;
        }

        #footerText {
            position: absolute;
            bottom: 2%;
            left: 5%;
            width: 90%;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            z-index: 2;
        }

        #infoButton,
        #anotherInfoButton {
            position: absolute;
            background-color: transparent;
            background-size: cover;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
        }

        #infoButton {
            background-image: url('提示.png');
            left: 6%;
            top: 21%;
        }

        #infoBox {
            position: absolute;
            top: 10%;

            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);

            z-index: 2;
        }

        #textBoxContainer {
            position: absolute;
            top: 32%;
            left: 70%;
            width: 30%;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 2;
        }

        #anotherInfoButton {
            background-image: url('提示.png');
            left: 66%;
            top: 41%;
        }

       .highlighted-link {
            position: absolute;
            top: 93%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: yellow;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="text-on-top">下载</div>

<script>

        const infoBox = document.getElementById('infoBox');
        infoBox.style.display = infoBox.style.display === 'none'? 'block' : 'none';

</html>
